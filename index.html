<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
       <div class="image-showcase">
    <img 
        src="https://www.instagram.com/images/assets_DO_NOT_HARDCODE/lox_brand/landing-2x.png" 
        alt=""
        class="login-screenshot" 
    >
</div>

        <div class="login-container">
            <div class="login-box">
                <h1 class="logo">Instagram</h1>
                
                
                <form class="login-form">
                    <input type="text" placeholder="Телефон, имя пользователя или эл. адрес" required>
                    <input type="password" placeholder="Пароль" required>
                    
                    <button type="submit" class="login-button">Войти</button>
                </form>

                <div class="divider">
                    <span class="line"></span>
                    <span class="text">ИЛИ</span>
                    <span class="line"></span>
                </div>

                <a href="#" class="facebook-login">
                    <span class="icon-fb">f</span> Войти через Facebook
                </a>
                
                <a href="#" class="forgot-password">Забыли пароль?</a>
            </div>

            <div class="signup-box">
                <p>
                    У вас нет аккаунта? 
                    <a href="#" class="signup-link">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <nav class="footer-links">
            <a href="#">Meta</a>
            <a href="#">Информация</a>
            <a href="#">Блог</a>
            <a href="#">Вакансии</a>
            <a href="#">API</a>
            <a href="#">Конфиденциальность</a>
            <a href="#">Условия</a>
            <a href="#">Места</a>
            <a href="#">Instagram Lite</a>
            <a href="#">Threads</a>
            <a href="#">Загрузка контактов и лица, не являющегося пользователем</a>
            <a href="#">Meta Verified</a>
        </nav>
        <div class="copyright">
            <span class="language">Русский </span>
            <span>© 2025 Instagram from Meta</span>
        </div>
    </footer>
    <script src="java.js"></script>
</body>
</html>
